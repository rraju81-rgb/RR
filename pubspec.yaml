name: sixthgear
description: "6thGear - Bharat ka apna drive companion. India's ultimate driving companion app."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # UI & Animation
  cupertino_icons: ^1.0.6
  google_fonts: ^6.1.0
  flutter_svg: ^2.0.9
  lottie: ^3.0.0
  shimmer: ^3.0.0
  flutter_animate: ^4.5.0
  liquid_pull_to_refresh: ^3.0.1
  flutter_staggered_grid_view: ^0.7.0
  carousel_slider: ^4.2.1
  smooth_page_indicator: ^1.1.0
  flutter_rating_bar: ^4.0.1
  flutter_slidable: ^3.0.1
  confetti: ^0.7.0
  animated_text_kit: ^4.2.2

  # Maps & Location
  google_maps_flutter: ^2.5.0
  geolocator: ^10.1.0
  geocoding: ^2.1.1
  flutter_polyline_points: ^2.0.0
  location: ^5.0.3
  flutter_map: ^6.1.0
  latlong2: ^0.9.0

  # State Management
  flutter_bloc: ^8.1.3
  provider: ^6.1.1
  get_it: ^7.6.4
  injectable: ^2.3.2
  freezed_annotation: ^2.4.1
  json_annotation: ^4.8.1

  # Networking
  dio: ^5.4.0
  retrofit: ^4.0.3
  connectivity_plus: ^5.0.2
  cached_network_image: ^3.3.1

  # Storage & Local DB
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  shared_preferences: ^2.2.2
  sqflite: ^2.3.0
  path_provider: ^2.1.1

  # Firebase
  firebase_core: ^2.24.2
  firebase_auth: ^4.16.0
  cloud_firestore: ^4.14.0
  firebase_messaging: ^14.7.10
  firebase_analytics: ^10.8.0
  firebase_crashlytics: ^3.4.9

  # Sensors & Hardware
  sensors_plus: ^4.0.2
  proximity_sensor: ^1.3.2
  flashlight: ^0.1.2
  torch_controller: ^2.0.1
  vibration: ^1.8.4
  flutter_local_notifications: ^16.3.0

  # Utilities
  intl: ^0.19.0
  url_launcher: ^6.2.2
  share_plus: ^7.2.1
  image_picker: ^1.0.7
  file_picker: ^6.1.1
  permission_handler: ^11.1.0
  device_info_plus: ^9.1.2
  package_info_plus: ^5.0.1
  app_settings: ^5.1.1
  wakelock_plus: ^1.1.4
  screen_brightness: ^0.2.2
  audio_session: ^0.1.18
  just_audio: ^0.9.36
  speech_to_text: ^6.5.1
  flutter_tts: ^3.8.5

  # Charts & Visualization
  fl_chart: ^0.66.0
  syncfusion_flutter_charts: ^24.1.41
  syncfusion_flutter_gauges: ^24.1.41

  # ML & AI
  tflite_flutter: ^0.10.4
  tflite_flutter_helper: ^0.3.1

  # Security
  local_auth: ^2.1.8
  encrypt: ^5.0.1
  crypto: ^3.0.3

  # Social & Communication
  flutter_contacts: ^1.1.7+1
  telephony: ^0.2.0

  # India-specific
  upi_india: ^3.0.1
  razorpay_flutter: ^1.3.6

  # WebSocket
  web_socket_channel: ^2.4.0

  # Background Services
  workmanager: ^0.5.2
  background_fetch: ^1.2.1

  # Testing
  mockito: ^5.4.4
  build_runner: ^2.4.7

  # Dev Tools
  logger: ^2.0.2
  pretty_dio_logger: ^1.3.1

  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  build_runner: ^2.4.7
  freezed: ^2.4.6
  json_serializable: ^6.7.1
  retrofit_generator: ^8.0.6
  injectable_generator: ^2.4.1
  hive_generator: ^2.0.1
  flutter_launcher_icons: ^0.13.1
  flutter_native_splash: ^2.3.9

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/fonts/
    - assets/animations/
    - assets/ml/

  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
        - asset: assets/fonts/Poppins-Medium.ttf
          weight: 500
        - asset: assets/fonts/Poppins-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700
        - asset: assets/fonts/Poppins-ExtraBold.ttf
          weight: 800
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Regular.ttf
        - asset: assets/fonts/Inter-Medium.ttf
          weight: 500
        - asset: assets/fonts/Inter-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Inter-Bold.ttf
          weight: 700

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/6thgear_logo.png"
  min_sdk_android: 21
  adaptive_icon_background: "#0A0E21"
  adaptive_icon_foreground: "assets/images/6thgear_logo_foreground.png"

flutter_native_splash:
  color: "#0A0E21"
  image: "assets/images/6thgear_logo.png"
  android: true
  ios: true
  web: false
